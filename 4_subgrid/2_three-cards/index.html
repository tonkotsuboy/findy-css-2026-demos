<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>subgrid - カードレイアウトの行揃え（3 カード）</title>
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="stage">
      <header class="section-head">
        <div class="eyebrow-row">
          <span class="eyebrow-dot" aria-hidden="true"></span>
          <span class="eyebrow">Upcoming</span>
        </div>
        <h2 class="section-title">直近の登壇予定</h2>
      </header>

      <div class="grid">
        <a href="#" class="card">
          <div class="thumb">
            <img
              src="./findy-css-2026.png"
              alt=""
              class="thumb-img"
              width="800"
              height="450"
            />
          </div>
          <time class="date" datetime="2026-05-14">2026年5月14日</time>
          <h3 class="title">鹿野さんに聞く！CSSの最新トレンド Ver.2026</h3>
          <div class="foot-row">
            <span class="register-btn">
              参加申し込み
              <img src="./arrow-up-right.svg" alt="" width="12" height="12" />
            </span>
          </div>
        </a>

        <a href="#" class="card">
          <div class="thumb">
            <img
              src="./cssnite-20260424.png"
              alt=""
              class="thumb-img"
              width="800"
              height="450"
            />
          </div>
          <time class="date" datetime="2026-04-24">2026年4月24日</time>
          <h3 class="title">
            Claude Codeとフロントエンド開発──全社員がAIエージェントを活用するUbieの実践事例
          </h3>
          <div class="foot-row">
            <span class="register-btn">
              参加申し込み
              <img src="./arrow-up-right.svg" alt="" width="12" height="12" />
            </span>
          </div>
        </a>

        <a href="#" class="card">
          <div class="thumb">
            <img
              src="./qiita-conference-2026.jpg"
              alt=""
              class="thumb-img"
              width="800"
              height="450"
            />
          </div>
          <time class="date" datetime="2026-05-27">2026年5月27日</time>
          <h3 class="title">
            Qiita Conference 2026
          </h3>
          <div class="foot-row">
            <span class="register-btn">
              参加申し込み
              <img src="./arrow-up-right.svg" alt="" width="12" height="12" />
            </span>
          </div>
        </a>
      </div>
    </main>
  </body>
</html>
