<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CSS Anchor Positioning - テーマ切り替えメニュー</title>
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <!-- Logo -->
        <a href="#" class="logo">
          <span class="avatar">
            <img src="./avatar.png" alt="" width="36" height="36" />
          </span>
        </a>

<!--        &lt;!&ndash; Nav &ndash;&gt;-->
<!--        <nav class="nav">-->
<!--          <a href="#" class="nav-link active">WORKS</a>-->
<!--          <a href="#" class="nav-link">ABOUT</a>-->
<!--          <a href="#" class="nav-link">CONTACT</a>-->
<!--        </nav>-->

        <!-- Actions: テーマ切り替えボタン -->
        <div class="actions">
          <button
            type="button"
            class="theme-button"
            commandfor="theme-menu"
            command="toggle-popover"
          >
            <img src="./sun.svg" alt="" width="18" height="18" />
          </button>

          <!-- Popover: theme-button にアンカー指定で位置決め -->
          <ul id="theme-menu" class="theme-menu" popover>
            <li>
              <button
                type="button"
                class="menu-item"
                commandfor="theme-menu"
                command="hide-popover"
              >
                <img class="menu-icon" src="./sun.svg" alt="" width="16" height="16" />
                <span class="menu-label">ライトテーマ</span>
                <img class="check-icon" src="./check.svg" alt="" width="16" height="16" />
              </button>
            </li>
            <li>
              <button
                type="button"
                class="menu-item"
                commandfor="theme-menu"
                command="hide-popover"
              >
                <img class="menu-icon" src="./moon.svg" alt="" width="16" height="16" />
                <span class="menu-label">ダークテーマ</span>
              </button>
            </li>
            <li>
              <button
                type="button"
                class="menu-item"
                commandfor="theme-menu"
                command="hide-popover"
              >
                <img class="menu-icon" src="./monitor.svg" alt="" width="16" height="16" />
                <span class="menu-label">システム</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>
  </body>
</html>
