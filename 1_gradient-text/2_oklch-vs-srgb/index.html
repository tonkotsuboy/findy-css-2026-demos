<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>sRGB vs OkLab vs OkLCH 補間色空間の比較</title>
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
  <header class="header">
    <h1>sRGB vs OKLab vs OKLCH 補間</h1>
  </header>

  <main class="stage">
    <!-- 青 ↔ 赤 -->
    <section class="pair">
      <h2 class="pair-title">blue → red</h2>

      <div class="row">
        <p class="row-label">sRGB</p>
        <div class="bar-cell">
          <div class="bar bar--blue-red-srgb"></div>
          <p class="bar-caption">中央: 暗い灰紫</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLab</p>
        <div class="bar-cell">
          <div class="bar bar--blue-red-oklab"></div>
          <p class="bar-caption">中央: くすんだ紫</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLCH</p>
        <div class="bar-cell">
          <div class="bar bar--blue-red-oklch"></div>
          <p class="bar-caption">中央: 鮮やかな紫</p>
        </div>
      </div>
    </section>

    <!-- 緑 ↔ マゼンタ -->
    <section class="pair">
      <h2 class="pair-title">green → magenta</h2>

      <div class="row">
        <p class="row-label">sRGB</p>
        <div class="bar-cell">
          <div class="bar bar--green-magenta-srgb"></div>
          <p class="bar-caption">中央: 濁ったグレー</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLab</p>
        <div class="bar-cell">
          <div class="bar bar--green-magenta-oklab"></div>
          <p class="bar-caption">中央: ほぼ灰色</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLCH</p>
        <div class="bar-cell">
          <div class="bar bar--green-magenta-oklch"></div>
          <p class="bar-caption">中央: 鮮やかな黄緑〜ピンク</p>
        </div>
      </div>
    </section>

    <!-- 黄 ↔ 青 -->
    <section class="pair">
      <h2 class="pair-title">yellow → blue</h2>

      <div class="row">
        <p class="row-label">sRGB</p>
        <div class="bar-cell">
          <div class="bar bar--yellow-blue-srgb"></div>
          <p class="bar-caption">中央: くすんだグレー</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLab</p>
        <div class="bar-cell">
          <div class="bar bar--yellow-blue-oklab"></div>
          <p class="bar-caption">中央: 灰みの緑</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLCH</p>
        <div class="bar-cell">
          <div class="bar bar--yellow-blue-oklch"></div>
          <p class="bar-caption">中央: 鮮やかな緑</p>
        </div>
      </div>
    </section>

    <!-- 赤 ↔ シアン -->
    <section class="pair">
      <h2 class="pair-title">red → cyan</h2>

      <div class="row">
        <p class="row-label">sRGB</p>
        <div class="bar-cell">
          <div class="bar bar--red-cyan-srgb"></div>
          <p class="bar-caption">中央: 灰色</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLab</p>
        <div class="bar-cell">
          <div class="bar bar--red-cyan-oklab"></div>
          <p class="bar-caption">中央: ほぼ無彩色</p>
        </div>
      </div>

      <div class="row">
        <p class="row-label">OkLCH</p>
        <div class="bar-cell">
          <div class="bar bar--red-cyan-oklch"></div>
          <p class="bar-caption">中央: 鮮やかな黄緑</p>
        </div>
      </div>
    </section>
  </main>
  </body>
</html>
